<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog — The Book Vault PH</title>
<meta name="description" content="Book reviews, reading lists, and bookish musings from The Book Vault PH.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Book Vault PH">
<meta property="og:title" content="Blog — The Book Vault PH">
<meta property="og:description" content="Book reviews, reading lists, and bookish musings.">
<meta property="og:url" content="https://thebookvaultph.com/blog">
<meta property="og:image" content="https://thebookvaultph.com/og-preview.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Blog — The Book Vault PH">
<meta name="twitter:description" content="Book reviews, reading lists, and bookish musings.">
<meta name="twitter:image" content="https://thebookvaultph.com/og-preview.png">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  --burgundy:#4A1C2A;--burgundy-deep:#1A0810;--copper:#B87333;--copper-soft:#D8A355;
  --cream:#EEE0D9;--cream-warm:#F5EDE4;--cream-shadow:rgba(74,28,42,.08);
  --ink:#3D2B24;--ink-soft:#8B7A66;--rule:rgba(74,28,42,.12);
}
html{scroll-behavior:smooth;}
body{margin:0;font-family:"Cormorant Garamond",Georgia,serif;background:var(--cream);color:var(--ink);line-height:1.6;}

/* NAV */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(26,8,16,.92);backdrop-filter:saturate(1.4) blur(12px);
  border-bottom:1px solid rgba(184,115,51,.18);
}
.nav-inner{
  max-width:1280px;margin:0 auto;padding:14px 28px;
  display:flex;align-items:center;justify-content:center;gap:32px;
}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--cream);flex-shrink:0;}
.brand-word{font-family:"Playfair Display",serif;font-weight:500;font-size:1.15rem;letter-spacing:.01em;color:var(--cream);white-space:nowrap;}
.brand-word em{font-style:italic;color:var(--copper-soft);font-weight:500;}
.nav-links{display:flex;align-items:center;gap:24px;}
.nav-links a{
  font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(253,248,243,.7);text-decoration:none;padding:6px 2px;border-bottom:1px solid transparent;
  transition:color .2s, border-color .2s;white-space:nowrap;
}
.nav-links a:hover{color:var(--copper-soft);border-bottom-color:var(--copper-soft);}
.nav-burger{display:none;background:none;border:none;color:var(--cream);font-size:1.5rem;cursor:pointer;padding:4px 8px;}
@media (max-width:680px){
  .nav-burger{display:block;}
  .nav-links{
    display:none;position:absolute;top:100%;left:0;right:0;
    background:var(--burgundy-deep);flex-direction:column;padding:20px 28px;gap:16px;
    border-top:1px solid rgba(253,248,243,.1);
  }
  .nav-links.open{display:flex;}
  .brand-word{display:none;}
}

/* HERO */
.hero{
  background:var(--burgundy-deep);color:var(--cream);padding:80px 28px;text-align:center;
}
.hero h1{font-family:"Playfair Display",serif;font-weight:400;font-size:clamp(2rem,5vw,3rem);margin:0 0 12px;line-height:1.1;}
.hero h1 em{font-style:italic;color:var(--copper-soft);}
.hero p{max-width:500px;margin:0 auto;color:rgba(253,248,243,.8);font-size:1.1rem;}

/* CONTENT */
.content{max-width:900px;margin:0 auto;padding:60px 28px;}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px;}
.blog-card{
  background:#fff;border-radius:12px;overflow:hidden;
  text-decoration:none;color:var(--ink);
  box-shadow:0 4px 20px rgba(0,0,0,.04);
  transition:all .25s ease;
}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08);}
.blog-card-img{
  height:180px;background:linear-gradient(135deg,#E8D5CC 0%,#D4C4B5 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;color:var(--copper);
}
.blog-card-body{padding:20px;}
.blog-card h3{
  font-family:"Playfair Display",serif;font-size:1.15rem;
  color:var(--burgundy);margin:0 0 8px;line-height:1.4;
}
.blog-card p{color:var(--ink-soft);font-size:.95rem;margin:0;line-height:1.5;}
.blog-empty{
  text-align:center;padding:60px 20px;color:var(--ink-soft);
  font-style:italic;grid-column:1/-1;
}

/* FOOTER */
.footer{
  background:var(--burgundy-deep);color:rgba(253,248,243,.6);
  padding:48px 28px;text-align:center;font-size:.9rem;
}
.footer a{color:var(--copper-soft);text-decoration:none;}
.footer a:hover{text-decoration:underline;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand">
      <span class="brand-word">The Book <em>Vault</em></span>
    </a>
    <button class="nav-burger" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="/browse">Browse</a>
      <a href="/coming-soon">Coming Soon</a>
      <a href="/blog">Blog</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>From the <em>Vault</em></h1>
  <p>Book reviews, reading lists, and bookish musings</p>
</section>

<div class="content">
  <div class="blog-grid" id="blogGrid">
    <div class="blog-empty">Blog posts coming soon</div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 The Book Vault PH · <a href="/contact">Contact</a></p>
</footer>

</body>
</html>
