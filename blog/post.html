<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="pageTitle">Loading… — The Book Vault PH</title>
<meta id="metaDesc" name="description" content="">
<meta property="og:type" content="article">
<meta property="og:site_name" content="The Book Vault PH">
<meta id="ogTitle" property="og:title" content="">
<meta id="ogDesc" property="og:description" content="">
<meta id="ogImg" property="og:image" content="https://thebookvaultph.com/og-preview.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  --burgundy:#4A1C2A;--burgundy-deep:#1A0810;--copper:#B87333;--copper-soft:#D8A355;
  --cream:#EEE0D9;--cream-warm:#F5EDE4;--cream-shadow:rgba(74,28,42,.08);
  --ink:#3D2B24;--ink-soft:#8B7A66;--rule:rgba(74,28,42,.12);
}
html{scroll-behavior:smooth;}
body{margin:0;font-family:"Cormorant Garamond",Georgia,serif;background:var(--cream);color:var(--ink);line-height:1.7;font-size:1.15rem;}
.nav{position:sticky;top:0;z-index:50;background:rgba(26,8,16,.92);backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid rgba(184,115,51,.18);}
.nav-inner{max-width:1280px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:center;gap:32px;}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--cream);flex-shrink:0;}
.brand-word{font-family:"Playfair Display",serif;font-weight:500;font-size:1.15rem;letter-spacing:.01em;color:var(--cream);}
.brand-word em{font-style:italic;color:var(--copper-soft);}
.nav-links{display:flex;align-items:center;gap:24px;}
.nav-links a{font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(253,248,243,.7);text-decoration:none;padding:6px 2px;border-bottom:1px solid transparent;transition:color .2s, border-color .2s;}
.nav-links a:hover{color:var(--copper-soft);border-bottom-color:var(--copper-soft);}
@media (max-width:680px){ .brand-word{display:none;} }

.hero-img{max-width:75%;width:calc(100% - 56px);max-height:260px;object-fit:cover;display:block;margin:24px auto 0;border-radius:12px;}
.article{max-width:75%;margin:0 auto;padding:48px 28px 80px;}
.crumb{font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);margin-bottom:14px;}
.crumb a{color:var(--copper);text-decoration:none;}
.crumb a:hover{text-decoration:underline;}
h1.post-title{font-family:"Playfair Display",serif;font-weight:500;font-size:clamp(2rem,5vw,3rem);line-height:1.15;color:var(--burgundy);margin:0 0 18px;}
.post-meta{font-family:"DM Mono",monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:14px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--rule);}
.post-meta .cat{color:var(--copper);}
.post-body{font-size:1.15rem;}
.post-body h1,.post-body h2,.post-body h3{font-family:"Playfair Display",serif;color:var(--burgundy);font-weight:500;line-height:1.25;margin:1.8em 0 .6em;}
.post-body h1{font-size:1.9rem;font-style:italic;}
.post-body h2{font-size:1.55rem;}
.post-body h3{font-size:1.25rem;}
.post-body p{margin:0 0 1.1em;}
.post-body a{color:var(--copper);}
.post-body img{max-width:100%;border-radius:8px;margin:1.5em 0;}
.post-body blockquote{margin:1.5em 0;padding:14px 22px;border-left:3px solid var(--copper);background:rgba(184,115,51,.06);font-style:italic;color:var(--burgundy);}
.post-body code{background:rgba(74,28,42,.08);padding:2px 6px;border-radius:3px;font-size:.92em;font-family:"DM Mono",monospace;}
.post-body pre{background:var(--burgundy-deep);color:var(--cream-warm);padding:16px 20px;border-radius:8px;overflow-x:auto;}
.post-body pre code{background:none;padding:0;color:inherit;}
.post-body ul,.post-body ol{padding-left:1.4em;margin:0 0 1.1em;}
.post-body table{width:100%;border-collapse:collapse;margin:1.5em 0;font-size:.95rem;background:var(--cream-warm);border-radius:10px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.06);}
.post-body thead{background:var(--burgundy);color:var(--cream);}
.post-body th{padding:14px 16px;text-align:left;font-family:"Playfair Display",serif;font-weight:500;letter-spacing:.02em;}
.post-body td{padding:12px 16px;border-bottom:1px solid rgba(74,28,42,.1);}
.post-body tbody tr:last-child td{border-bottom:none;}
.post-body tbody tr:hover{background:rgba(184,115,51,.05);}
.post-body tbody tr:nth-child(even){background:rgba(74,28,42,.03);}
.post-body tbody tr:nth-child(even):hover{background:rgba(184,115,51,.07);}
.post-body .embed-container{margin:1.5em 0;border-radius:10px;overflow:hidden;}
.post-body .embed-container iframe{max-width:100%;border:none;border-radius:10px;}
.post-body hr{border:none;border-top:1px dashed var(--copper);margin:2em 0;opacity:.4;}
.post-body li{margin-bottom:.4em;}
.post-body hr{border:none;border-top:1px solid var(--rule);margin:2em 0;}
.tags{margin-top:48px;padding-top:24px;border-top:1px solid var(--rule);display:flex;flex-wrap:wrap;gap:8px;}
.tags .tag{font-family:"DM Mono",monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--copper);background:rgba(184,115,51,.08);border:1px solid rgba(184,115,51,.25);padding:4px 10px;border-radius:3px;}
.back-link{display:inline-block;margin-top:32px;font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);text-decoration:none;}
.back-link:hover{text-decoration:underline;}
.loading,.notfound{text-align:center;padding:80px 20px;color:var(--ink-soft);font-style:italic;}
.preview-banner{background:#B87333;color:var(--burgundy-deep);text-align:center;padding:10px;font-family:"DM Mono",monospace;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;}
.footer{background:var(--burgundy-deep);color:rgba(253,248,243,.6);padding:48px 28px;text-align:center;font-size:.9rem;}
.footer a{color:var(--copper-soft);text-decoration:none;}
</style>
</head>
<body>

<div id="previewBanner" class="preview-banner" style="display:none;">⚡ preview mode · this post is not live yet</div>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand"><span class="brand-word">The Book <em>Vault</em> PH</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/browse">Browse</a>
      <a href="/coming-soon">Coming Soon</a>
      <a href="/blog">Blog</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</nav>

<img id="heroImg" class="hero-img" src="" alt="" style="display:none;">

<article class="article" id="article">
  <div class="loading">Loading…</div>
</article>

<footer class="footer">
  <p>© 2026 The Book Vault PH · <a href="/contact">Contact</a> · <a href="/blog">All posts</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="/config.js"></script>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const isPreview = params.get('preview') === '1';
  // Extract slug from URL path: /blog/<slug> or ?slug=<slug>
  let slug = params.get('slug');
  if (!slug) {
    const parts = location.pathname.split('/').filter(Boolean);
    if (parts[0] === 'blog' && parts[1]) slug = decodeURIComponent(parts[1]);
  }
  const article = document.getElementById('article');
  if (!slug) { article.innerHTML = '<div class="notfound">No post specified.</div>'; return; }

  const cfg = window.BVPH_CONFIG || {};
  if (!cfg.SUPABASE_URL) { article.innerHTML = '<div class="notfound">Config error.</div>'; return; }
  const sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, { auth:{ persistSession:false }});

  let q = sb.from('blog_posts').select('*').eq('slug', slug);
  if (!isPreview) q = q.eq('status', 'published');
  const { data, error } = await q.maybeSingle();

  if (error || !data) {
    article.innerHTML = `<div class="notfound">Post not found.<br><br><a class="back-link" href="/blog">← back to blog</a></div>`;
    document.getElementById('pageTitle').textContent = 'Not found — The Book Vault PH';
    return;
  }

  if (isPreview && data.status !== 'published') {
    document.getElementById('previewBanner').style.display = 'block';
  }

  const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmt = iso => iso ? new Date(iso).toLocaleDateString('en-PH', {year:'numeric',month:'long',day:'numeric'}) : '';

  // SEO
  const title = data.meta_title || data.title;
  const desc = data.meta_description || data.excerpt || '';
  document.getElementById('pageTitle').textContent = `${title} — The Book Vault PH`;
  document.getElementById('metaDesc').content = desc;
  document.getElementById('ogTitle').content = title;
  document.getElementById('ogDesc').content = desc;
  if (data.og_image || data.featured_image) document.getElementById('ogImg').content = data.og_image || data.featured_image;

  // Hero image
  if (data.featured_image) {
    const hero = document.getElementById('heroImg');
    hero.src = data.featured_image;
    hero.alt = data.title;
    hero.style.display = 'block';
  }

  // Render markdown
  marked.setOptions({ breaks: true, gfm: true });
  const html = marked.parse(data.content || '');

  const tagsHtml = (data.tags || []).length
    ? `<div class="tags">${data.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`
    : '';

  article.innerHTML = `
    <div class="crumb"><a href="/blog">← Blog</a></div>
    <h1 class="post-title">${esc(data.title)}</h1>
    <div class="post-meta">
      ${data.category ? `<span class="cat">${esc(data.category)}</span>` : ''}
      ${data.published_at ? `<span>${fmt(data.published_at)}</span>` : ''}
      ${data.reading_time ? `<span>${data.reading_time} min read</span>` : ''}
      ${data.updated_at && data.published_at && new Date(data.updated_at) - new Date(data.published_at) > 86400000 ? `<span style="opacity:.7;">updated ${fmt(data.updated_at)}</span>` : ''}
    </div>
    <div class="post-body">${html}</div>
    ${tagsHtml}
    <a href="/blog" class="back-link">← back to all posts</a>
  `;

  // JSON-LD Article schema
  const ld = {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": data.title,
    "description": desc,
    "image": data.featured_image || undefined,
    "datePublished": data.published_at || data.created_at,
    "dateModified": data.updated_at,
    "author": { "@type": "Organization", "name": "The Book Vault PH" },
    "publisher": { "@type": "Organization", "name": "The Book Vault PH" },
    "mainEntityOfPage": { "@type": "WebPage", "@id": `https://thebookvaultph.com/blog/${encodeURIComponent(data.slug)}` }
  };
  const ldScript = document.createElement('script');
  ldScript.type = 'application/ld+json';
  ldScript.textContent = JSON.stringify(ld);
  document.head.appendChild(ldScript);
})();
</script>

</body>
</html>
