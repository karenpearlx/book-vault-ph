<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment — The Book Vault PH</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF7F2;--burgundy:#6B2D3C;--burgundy-deep:#4A1E2A;--burgundy-darker:#3A1620;
  --copper:#D89A55;--copper-soft:#E8C496;--gold:#C9A94D;--text:#2E0F1A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:var(--burgundy-darker);color:var(--cream);line-height:1.6;min-height:100vh;}
a{color:var(--copper-soft);text-decoration:none;}
a:hover{text-decoration:underline;}

/* NAV */
.nav{background:linear-gradient(180deg,rgba(58,22,32,.95) 0%,rgba(58,22,32,.8) 100%);
  padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(216,154,85,.15);backdrop-filter:blur(8px);}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--cream);}
.brand-word{font-family:'Playfair Display',serif;font-weight:500;font-size:1.15rem;}
.brand-word em{font-style:italic;color:var(--copper-soft);}
.nav-links{display:flex;gap:1.5rem;}
.nav-links a{color:rgba(255,255,255,.7);font-size:.9rem;transition:color .2s;}
.nav-links a:hover{color:var(--copper-soft);text-decoration:none;}

/* CONTAINER */
.container{max-width:680px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}

/* HEADER */
.page-header{text-align:center;margin-bottom:2.5rem;}
.page-header h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:500;margin-bottom:.5rem;}
.page-header h1 em{font-style:italic;color:var(--copper);}
.page-header .sub{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--copper-soft);opacity:.8;}
.checkmark{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--copper) 0%,#B8864A 100%);color:var(--burgundy-darker);font-size:1.5rem;margin-bottom:1rem;
  box-shadow:0 4px 20px rgba(216,154,85,.3);}

/* CARD */
.card{background:linear-gradient(145deg,rgba(74,30,42,.6) 0%,rgba(58,22,32,.8) 100%);
  border:1px solid rgba(216,154,85,.2);border-radius:16px;padding:2rem;margin-bottom:1.5rem;
  box-shadow:0 8px 32px rgba(0,0,0,.25);}
.card-header{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:500;margin-bottom:.25rem;}
.card-header em{font-style:italic;color:var(--copper);}
.card-sub{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--copper-soft);opacity:.7;margin-bottom:1.5rem;}

/* ORDER ID */
.order-id{display:inline-block;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--copper);
  background:rgba(216,154,85,.1);border:1px solid rgba(216,154,85,.25);border-radius:6px;padding:.4rem .8rem;margin-bottom:1.5rem;}

/* BOOK ROW */
.book-row{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid rgba(216,154,85,.15);}
.book-row:last-child{border-bottom:none;}
.book-cover{width:55px;height:80px;border-radius:6px;background:linear-gradient(135deg,var(--burgundy),var(--burgundy-deep));
  background-size:cover;background-position:center;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.3);}
.book-info{flex:1;}
.book-title{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;color:var(--cream);margin-bottom:.2rem;}
.book-author{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--copper-soft);opacity:.8;}
.book-price{font-family:'DM Mono',monospace;font-weight:600;color:var(--copper);font-size:1.05rem;}

/* TOTAL */
.total-row{display:flex;justify-content:space-between;padding:1.25rem 0 .5rem;
  border-top:2px solid rgba(216,154,85,.3);margin-top:.75rem;}
.total-row span:first-child{font-family:'Playfair Display',serif;font-size:1.1rem;}
.total-row span:last-child{font-family:'DM Mono',monospace;font-size:1.2rem;font-weight:600;color:var(--copper);}

/* CUSTOMER INFO */
.customer-box{background:rgba(216,154,85,.08);border:1px solid rgba(216,154,85,.15);border-radius:10px;padding:1.25rem;margin-top:1.5rem;}
.customer-box h4{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--copper);margin-bottom:.5rem;}
.customer-box p{font-size:.95rem;color:var(--cream);margin:.25rem 0;}
.customer-box .note{font-size:.85rem;color:var(--copper-soft);opacity:.8;margin-top:.5rem;}

/* QR SECTION */
.qr-section{text-align:center;padding:1.5rem 0;}
.qr-wrap{display:inline-block;background:#fff;padding:1rem;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.qr-wrap img{max-width:200px;border-radius:4px;}
.qr-label{margin-top:1rem;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--copper-soft);}

/* SHIPPING TABLE */
.shipping-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.9rem;}
.shipping-table th,.shipping-table td{padding:.6rem .8rem;text-align:left;border-bottom:1px solid rgba(216,154,85,.15);}
.shipping-table th{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--copper);font-weight:500;}
.shipping-table td{color:var(--cream);}
.shipping-table .price{font-family:'DM Mono',monospace;color:var(--copper);text-align:right;}

/* BUTTONS */
.btn{display:inline-block;padding:.9rem 2rem;border-radius:8px;font-weight:600;font-size:.95rem;
  text-decoration:none;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#C9A94D 0%,#B8942A 100%);color:var(--burgundy-darker);
  box-shadow:0 4px 16px rgba(201,169,77,.4);}

/* Copyable order ID */
.order-copy{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:8px 14px;
  background:rgba(201,169,77,.15);border:1px dashed rgba(201,169,77,.5);border-radius:6px;
  cursor:pointer;transition:all .2s;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--gold);}
.order-copy:hover{background:rgba(201,169,77,.25);border-color:var(--gold);}
.order-copy .copy-icon{font-size:1rem;opacity:.7;}
.order-copy.copied{background:rgba(100,200,100,.15);border-color:rgba(100,200,100,.5);}
.order-copy.copied .copy-icon::after{content:' ✓';}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(216,154,85,.4);text-decoration:none;}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(216,154,85,.1);border:1px solid rgba(216,154,85,.3);color:var(--copper-soft);}
.btn-secondary:hover{background:rgba(216,154,85,.15);text-decoration:none;}

/* NOTE BOX */
.note-box{background:rgba(216,154,85,.1);border-left:3px solid var(--copper);padding:1rem 1.25rem;border-radius:0 8px 8px 0;margin:1.5rem 0;}
.note-box strong{color:var(--copper);}
.note-box p{font-size:.9rem;color:var(--cream);margin:.25rem 0;}

/* SUCCESS STATE */
.success-state{text-align:center;padding:2rem;}
.success-state h3{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.5rem;}
.success-state p{color:var(--copper-soft);font-size:.95rem;}

/* ERROR STATE */
.error-state{text-align:center;padding:3rem;}
.error-state h2{font-family:'Playfair Display',serif;color:var(--copper);margin-bottom:1rem;}

/* CTA */
.cta{text-align:center;margin-top:2rem;}

/* FOOTER */
footer{text-align:center;padding:2rem;font-size:.8rem;color:rgba(255,255,255,.4);border-top:1px solid rgba(216,154,85,.1);}

@media(max-width:600px){
  .nav{padding:.8rem 1rem;}
  .nav-links{display:none;}
  .container{padding:1.5rem 1rem 3rem;}
  .card{padding:1.5rem;}
  .page-header h1{font-size:1.8rem;}
  .book-row{gap:.75rem;}
  .book-cover{width:45px;height:65px;}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="brand">
    <span class="brand-word">The Book <em>Vault</em> PH</span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/browse.html">Browse</a>
    <a href="/coming-soon.html">Coming Soon</a>
    <a href="/contact.html">Contact</a>
  </div>
</nav>

<div class="container">
  <div id="content">
    <div style="text-align:center;padding:3rem;color:var(--copper-soft);">Loading order...</div>
  </div>
</div>

<footer>© <span id="yr">2026</span> The Book Vault PH · Detective Mochi approves 🐾</footer>

<script src="/config.js"></script>
<script src="/shared.js"></script>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function copyOrderId(){
  const id = document.getElementById('orderIdText')?.textContent;
  if(id){
    navigator.clipboard.writeText(id);
    const el = document.querySelector('.order-copy');
    el.classList.add('copied');
    el.querySelector('.copy-icon').textContent = '✓ Copied!';
    setTimeout(() => {
      el.classList.remove('copied');
      el.querySelector('.copy-icon').textContent = '📋';
    }, 2000);
  }
}

document.getElementById('yr').textContent = new Date().getFullYear();

const params = new URLSearchParams(location.search);
const orderId = params.get('order');

BVPH.init().then(() => {
  const order = BVPH.getOrder(orderId);
  
  if (!order) {
    $('#content').innerHTML = `
      <div class="error-state">
        <h2>Order not found</h2>
        <p>This order may have expired or the link is invalid.</p>
        <p style="margin-top:1rem;"><a href="/">← Back to shop</a></p>
      </div>`;
    return;
  }
  
  const books = order.isCart ? order.books : [{ 
    title: order.bookTitle, 
    author: order.bookAuthor, 
    price: order.bookPrice,
    cover: order.bookCover 
  }];
  
  const total = order.isCart 
    ? books.reduce((sum, b) => sum + (Number(b.price) || 0), 0)
    : Number(order.bookPrice) || 0;
  
  const booksHtml = books.map(b => {
    const coverStyle = b.cover ? `background-image:url('${esc(b.cover)}');` : '';
    return `<div class="book-row">
      <div class="book-cover" style="${coverStyle}"></div>
      <div class="book-info">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-author">by ${esc(b.author || 'Unknown')}</div>
      </div>
      <div class="book-price">₱${b.price || 0}</div>
    </div>`;
  }).join('');
  
  const isWithinSC = order.withinSC;
  const isPaid = order.status === 'paid';
  
  // QR payment section (always shown - book payment)
  const qrSection = `
    <div class="card">
      <div class="card-header">Scan to <em>pay</em></div>
      <div class="card-sub">BPI / InstaPay / GCash / Maya</div>
      
      <div class="qr-section">
        <div class="qr-wrap">
          <img src="/bpi-qr.png" alt="BPI QR Code">
        </div>
        <div class="qr-label">TBV SALES · Transfer fees may apply</div>
      </div>
      
      <div class="note-box">
        <strong>📱 After payment:</strong>
        <p>Take a screenshot of your payment confirmation and send it to our Facebook or Instagram along with your order ID:</p>
        <div class="order-copy" onclick="copyOrderId()" title="Click to copy">
          <span id="orderIdText">${esc(order.id)}</span>
          <span class="copy-icon">📋</span>
        </div>
      </div>
      
      ${isPaid ? `
        <div class="success-state">
          <h3>✓ Payment confirmed!</h3>
          <p>We'll arrange delivery soon.</p>
        </div>
      ` : `
        <div class="cta">
          <button class="btn btn-primary" id="paidBtn">I've sent my payment</button>
        </div>
      `}
    </div>
  `;
  
  // Shipping info (only for outside San Carlos)
  const shippingSection = !isWithinSC ? `
    <div class="card">
      <div class="card-header">Shipping <em>fee</em></div>
      <div class="card-sub">Cash on Delivery (COD)</div>
      
      <p style="margin-bottom:1rem;color:var(--copper-soft);">Pay the book via QR above. Shipping fee is paid to the courier when your book arrives.</p>
      
      <table class="shipping-table">
        <tr><th>Destination</th><th class="price">Shipping Fee (COD)</th></tr>
        <tr><td>Within Visayas</td><td class="price">₱100 – ₱150</td></tr>
        <tr><td>Luzon</td><td class="price">₱150 – ₱200</td></tr>
        <tr><td>Mindanao</td><td class="price">₱150 – ₱200</td></tr>
      </table>
      
      <div class="note-box">
        <strong>📦 What's next:</strong>
        <p>After we confirm your payment, we'll message you with the exact shipping fee and estimated delivery date before we ship.</p>
      </div>
      
      <p style="font-size:.85rem;color:var(--copper-soft);margin-top:1rem;">
        Questions? <a href="/contact.html">Contact us</a>
      </p>
    </div>
  ` : '';
  
  const paymentHtml = qrSection + shippingSection;
  
  $('#content').innerHTML = `
    <div class="page-header">
      <div class="checkmark">✓</div>
      <h1>Order <em>placed!</em></h1>
      <div class="sub">Thank you for your order</div>
    </div>
    
    <div class="card">
      <div class="card-header">Order <em>summary</em></div>
      <div class="order-id">${esc(order.id)}</div>
      
      ${booksHtml}
      
      <div class="total-row">
        <span>Book total</span>
        <span>₱${total}</span>
      </div>
      ${!isWithinSC ? `<p style="font-size:.85rem;color:var(--copper-soft);margin-top:.5rem;">+ shipping fee (COD, see below)</p>` : `<p style="font-size:.85rem;color:var(--copper-soft);margin-top:.5rem;">Free delivery within San Carlos City 🎉</p>`}
      
      <div class="customer-box">
        <h4>Delivering to</h4>
        <p><strong>${esc(order.customerName)}</strong></p>
        ${order.address ? `<p>${esc(order.address)}</p>` : '<p><em>San Carlos City (free delivery)</em></p>'}
        ${order.notes ? `<p class="note">Note: ${esc(order.notes)}</p>` : ''}
      </div>
    </div>
    
    ${paymentHtml}
    
    <div class="cta">
      <a href="/" class="btn btn-secondary">← Continue browsing</a>
    </div>
  `;
  
  // Handle "I've sent my payment" button
  const paidBtn = $('#paidBtn');
  if (paidBtn) {
    paidBtn.onclick = () => {
      BVPH.markOrderPaid(orderId);
      paidBtn.disabled = true;
      paidBtn.textContent = 'Payment marked ✓';
      paidBtn.parentElement.innerHTML = `
        <div class="success-state">
          <h3>✓ Payment marked!</h3>
          <p>We'll confirm and arrange delivery soon.</p>
        </div>
      `;
    };
  }
});
</script>
</body>
</html>
